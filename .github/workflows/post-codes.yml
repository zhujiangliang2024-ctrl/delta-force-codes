name: Post Daily Codes to Discord

on:
  schedule:
    # 每天北京时间9点 = UTC 1点
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Fetch and Post to Discord
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          import re
          from datetime import datetime
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
          }
          
          url = "https://deltaforcetools.gg/"
          
          try:
              response = requests.get(url, headers=headers, timeout=30)
              html_content = response.text
              
              # Find the data section containing daily codes
              idx = html_content.find('"2e:')
              end_idx = html_content.find('"])', idx)
              
              if idx != -1 and end_idx != -1:
                  section = html_content[idx:end_idx]
                  # Unescape the JavaScript string literals
                  unescaped = section.replace('\\"', '"')
                  
                  # Extract codes: "pwd":"XXXX"
                  codes_list = re.findall(r'"pwd":"(\d{4})"', unescaped)
                  # Extract locations: "en":"LOCATION"
                  locs_list = re.findall(r'"en":"([^"]+)"', unescaped)
                  # Extract image URLs: "pic":"URL"
                  pics_list = re.findall(r'"pic":"([^"]+)"', unescaped)
                  
                  # Build codes dictionary with images
                  codes = {}
                  for i, loc in enumerate(locs_list):
                      if i < len(codes_list):
                          pic_url = pics_list[i] if i < len(pics_list) else ""
                          codes[loc] = {"code": codes_list[i], "pic": pic_url}
              else:
                  codes = {}
          except Exception as e:
              codes = {}
          
          today = datetime.now().strftime("%Y-%m-%d")
          
          webhook_url = "https://discord.com/api/webhooks/1514440541977448558/lkxUi2tSqgvG8WXCyJLpMgJFzJqFVYp-HkAQZJUmUiOLC4k52T-13TnpqhZt3yRr5y2_"
          
          # Build embed message with images
          payload = {
              "content": "@door code notifications",
              "embeds": [
                  {
                      "title": f"🎮 Delta Force Daily Codes - {today}",
                      "color": 5814783,  # Green color
                      "fields": [],
                      "footer": {
                          "text": "Source: deltaforcetools.gg"
                      }
                  }
              ]
          }
          
          # Add fields for each location
          for loc, data in codes.items():
              field = {
                  "name": f"📍 {loc}",
                  "value": f"Code: `{data['code']}`",
                  "inline": True
              }
              payload["embeds"][0]["fields"].append(field)
          
          # Add thumbnail images for each location
          for loc, data in codes.items():
              if data['pic']:
                  # Add location image as additional field with inline image reference
                  thumbnail_url = data['pic'].split('?')[0] + "?wx_fmt=png" if data['pic'] else ""
                  # For webhooks, we can add one image per embed, so we'll use the first location's image
                  if "image" not in payload["embeds"][0]:
                      payload["embeds"][0]["image"] = {"url": data['pic']}
                      payload["embeds"][0]["thumbnail"] = {"url": data['pic']}
                  break
          
          response = requests.post(webhook_url, json=payload, timeout=30)
          print(f"Status: {response.status_code}")
          if response.status_code in [200, 204]:
              print("Successfully posted to Discord!")
          else:
            print(f"Failed: {response.text}")
          EOF