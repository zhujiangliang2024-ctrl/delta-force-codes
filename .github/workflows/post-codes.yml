name: Post Daily Codes to Discord

on:
  schedule:
    # 每天北京时间8点 = UTC 0点
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Fetch and Post to Discord
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          import re
          from datetime import datetime
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
          }
          
          url = "https://deltaforcetools.gg/"
          
          try:
              response = requests.get(url, headers=headers, timeout=30)
              html_content = response.text
              
              # Find the data section containing daily codes
              idx = html_content.find('"2e:')
              end_idx = html_content.find('"])', idx)
              
              if idx != -1 and end_idx != -1:
                  section = html_content[idx:end_idx]
                  unescaped = section.replace('\\"', '"')
                  
                  codes_list = re.findall(r'"pwd":"(\d{4})"', unescaped)
                  locs_list = re.findall(r'"en":"([^"]+)"', unescaped)
                  pics_list = re.findall(r'"pic":"([^"]+)"', unescaped)
                  
                  codes = {}
                  for i, loc in enumerate(locs_list):
                      if i < len(codes_list):
                          pic_url = pics_list[i] if i < len(pics_list) else ""
                          codes[loc] = {"code": codes_list[i], "pic": pic_url}
              else:
                  codes = {}
          except Exception as e:
              codes = {}
          
          today = datetime.now().strftime("%Y-%m-%d")
          
          webhook_url = "https://discord.com/api/webhooks/1514440541977448558/lkxUi2tSqgvG8WXCyJLpMgJFzJqFVYp-HkAQZJUmUiOLC4k52T-13TnpqhZt3yRr5y2_"
          
          # Create 5 embeds, one for each location with its image
          embeds = []
          for loc, data in codes.items():
              embed = {
                  "title": f"📍 {loc}",
                  "description": f"**Code:** `{data['code']}`",
                  "color": 5814783,
                  "image": {"url": data['pic']} if data['pic'] else None,
                  "footer": {"text": f"deltaforcetools.gg • {today}"}
              }
              # Remove None values
              embed = {k: v for k, v in embed.items() if v is not None}
              embeds.append(embed)
          
          payload = {
              "content": f"@door code notifications\n\n**🎮 Delta Force Daily Codes - {today}**",
              "embeds": embeds
          }
          
          response = requests.post(webhook_url, json=payload, timeout=30)
          print(f"Status: {response.status_code}")
          if response.status_code in [200, 204]:
              print("Successfully posted 5 images to Discord!")
          else:
              print(f"Failed: {response.text}")
          EOF