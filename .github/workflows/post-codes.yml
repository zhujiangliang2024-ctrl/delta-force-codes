name: Post Daily Codes to Discord

on:
  schedule:
    # 每天北京时间9点 = UTC 1点
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Fetch and Post to Discord
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          import re
          from datetime import datetime
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
          }
          
          url = "https://deltaforcetools.gg/"
          
          try:
              response = requests.get(url, headers=headers, timeout=30)
              html_content = response.text
              
              # Find the data section containing daily codes
              idx = html_content.find('"2e:')
              end_idx = html_content.find('"])', idx)
              
              if idx != -1 and end_idx != -1:
                  section = html_content[idx:end_idx]
                  # Unescape the JavaScript string literals
                  unescaped = section.replace('\\"', '"')
                  
                  # Extract codes: "pwd":"XXXX"
                  codes_list = re.findall(r'"pwd":"(\d{4})"', unescaped)
                  # Extract locations: "en":"LOCATION"
                  locs_list = re.findall(r'"en":"([^"]+)"', unescaped)
                  
                  # Build codes dictionary
                  codes = {}
                  for i, loc in enumerate(locs_list):
                      if i < len(codes_list):
                          codes[loc] = codes_list[i]
              else:
                  # Fallback codes if parsing fails
                  codes = {
                      'Dam': '4601',
                      'Layali Grove': '4890',
                      'Brakkesh': '0896',
                      'Space City': '4025',
                      'Tide Prison': '0092'
                  }
          except Exception as e:
              # Fallback codes
              codes = {
                  'Dam': '4601',
                  'Layali Grove': '4890',
                  'Brakkesh': '0896',
                  'Space City': '4025',
                  'Tide Prison': '0092'
              }
          
          today = datetime.now().strftime("%Y-%m-%d")
          
          # Build message
          message = "@door code notifications \n\n"
          message += f"**🎮 Delta Force Daily Codes - {today}**\n\n"
          for loc, code in codes.items():
              message += f"📍 **{loc}**: `{code}`\n"
          message += "\n_Source: deltaforcetools.gg_"
          
          webhook_url = "https://discord.com/api/webhooks/1514440541977448558/lkxUi2tSqgvG8WXCyJLpMgJFzJqFVYp-HkAQZJUmUiOLC4k52T-13TnpqhZt3yRr5y2_"
          
          payload = {"content": message}
          response = requests.post(webhook_url, json=payload, timeout=30)
          print(f"Status: {response.status_code}")
          if response.status_code in [200, 204]:
              print("Successfully posted to Discord!")
          else:
              print(f"Failed: {response.text}")
          EOF