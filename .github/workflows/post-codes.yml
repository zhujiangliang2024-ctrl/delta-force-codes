name: Post Daily Codes to Discord

on:
  schedule:
    # 每天北京时间9点 = UTC 1点
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      notify:
        description: '启用 @everyone 通知'
        required: false
        default: 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Fetch and Post to Discord
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          import re
          from datetime import datetime
          
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
          }
          
          url = "https://deltaforcetools.gg/"
          
          # Default codes
          codes = {
              'Dam': '4010',
              'Layali Grove': '4324',
              'Brakkesh': '0182',
              'Space City': '6428',
              'Tide Prison': '0912'
          }
          
          try:
              response = requests.get(url, headers=headers, timeout=30)
              html = response.text
              
              # Try to find codes in the HTML
              # Pattern: location name followed by a 4-digit code
              patterns = [
                  r'Dam</[^>]*>[^<]*<[^>]*>(\d{4})',
                  r'Dam[^<]{0,50}(\d{4})',
                  r'"Dam"\s*:\s*"(\d{4})"',
              ]
              
              found_codes = {}
              for pattern in patterns:
                  matches = re.findall(pattern, html, re.IGNORECASE)
                  if matches:
                      found_codes['Dam'] = matches[0]
                      break
              
              # Look for other locations
              for loc in ['Layali Grove', 'Brakkesh', 'Space City', 'Tide Prison']:
                  loc_pattern = f'{loc}[^<]{{0,50}}(\d{{4}})'
                  matches = re.findall(loc_pattern, html, re.IGNORECASE)
                  if matches:
                      codes[loc] = matches[0]
              
          except Exception as e:
              pass
          
          today = datetime.now().strftime("%Y-%m-%d")
          
          # Check if we should notify
          notify = '''${{ github.event.inputs.notify }}'''.lower() == 'true'
          
          message = ""
          if notify:
              message += "@door code notifications \n\n"
          
          message += f"**🎮 Delta Force Daily Codes - {today}**\n\n"
          for loc, code in codes.items():
              message += f"📍 **{loc}**: `{code}`\n"
          message += "\n_Source: deltaforcetools.gg_"
          
          webhook_url = "https://discord.com/api/webhooks/1514440541977448558/lkxUi2tSqgvG8WXCyJLpMgJFzJqFVYp-HkAQZJUmUiOLC4k52T-13TnpqhZt3yRr5y2_"
          
          payload = {"content": message}
          response = requests.post(webhook_url, json=payload, timeout=30)
          print(f"Status: {response.status_code}")
          if response.status_code in [200, 204]:
              print("Successfully posted to Discord!")
          else:
              print(f"Failed: {response.text}")
          EOF